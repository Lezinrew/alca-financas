version: '3.8'

services:
  # ============================================
  # Backend - Flask API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        PYTHON_VERSION: 3.12
    image: alca-backend:latest
    container_name: alca-backend
    restart: unless-stopped

    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=30
      - PORT=8001

    env_file:
      - ./backend/.env.production

    ports:
      - "8001:8001"

    volumes:
      - ./backend/logs:/app/logs
      - backend-data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - alca-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.alca.service=backend"
      - "com.alca.environment=production"

  # ============================================
  # Frontend - React Application
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NODE_VERSION: 20
        VITE_API_URL: ${VITE_API_URL}
    image: alca-frontend:latest
    container_name: alca-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - alca-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.alca.service=frontend"
      - "com.alca.environment=production"

    depends_on:
      backend:
        condition: service_healthy

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: alca-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - certbot-data:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro

    networks:
      - alca-network

    depends_on:
      - frontend
      - backend

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.alca.service=nginx"
      - "com.alca.environment=production"

  # ============================================
  # Certbot - SSL Certificate Management
  # ============================================
  certbot:
    image: certbot/certbot:latest
    container_name: alca-certbot
    volumes:
      - certbot-data:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN} -d www.${DOMAIN} -d api.${DOMAIN}
    depends_on:
      - nginx
    networks:
      - alca-network

# ============================================
# Volumes
# ============================================
volumes:
  backend-data:
    driver: local
  certbot-data:
    driver: local
  certbot-conf:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  alca-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
