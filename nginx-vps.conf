# =====================================================
# Nginx Configuration for VPS - Alça Finanças
# =====================================================
# Este arquivo deve ser copiado para: /etc/nginx/sites-available/alcahub.cloud
# E criar um link em: /etc/nginx/sites-enabled/alcahub.cloud
#
# Comandos:
#   sudo cp nginx-vps.conf /etc/nginx/sites-available/alcahub.cloud
#   sudo ln -s /etc/nginx/sites-available/alcahub.cloud /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================

# Redirect www to non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.alcahub.cloud;
    return 301 https://alcahub.cloud$request_uri;
}

# Main site - alcahub.cloud
server {
    listen 80;
    listen [::]:80;
    server_name alcahub.cloud;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Frontend (proxy to Docker container on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# API subdomain - api.alcahub.cloud
server {
    listen 80;
    listen [::]:80;
    server_name api.alcahub.cloud;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Backend API (proxy to Docker container on port 8001)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # JWT: sem isto o Gunicorn pode não receber Authorization e devolve 401
        proxy_set_header Authorization $http_authorization;
        proxy_cache_bypass $http_upgrade;

        # CORS headers (adicione se necessário)
        add_header 'Access-Control-Allow-Origin' 'https://alcahub.cloud' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
