name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Preparar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Adicionar servidor ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Sincronizar projeto no servidor
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /var/www/alca-financas

            echo "==> Limpando alterações locais indesejadas"
            git reset --hard HEAD
            git clean -fd

            echo "==> Atualizando repositório"
            git pull origin main
          EOF

      - name: Buildar frontend e publicar em build/frontend no servidor
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /var/www/alca-financas

            echo "==> Limpando builds antigos"
            rm -rf frontend/dist build/frontend
            mkdir -p build/frontend

            echo "==> Buildando frontend com Node em container"
            docker run --rm \
              -v /var/www/alca-financas/frontend:/app \
              -w /app \
              node:22-alpine \
              sh -lc "npm install && npm run build"

            echo "==> Copiando dist para build/frontend"
            cp -a frontend/dist/. build/frontend/

            echo "==> Verificando index final"
            sed -n '1,20p' build/frontend/index.html
          EOF

      - name: Rebuild e restart dos containers
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /var/www/alca-financas

            echo "==> Rebuildando backend/openclaw se necessário"
            docker compose -f docker-compose.prod.yml build

            echo "==> Subindo containers"
            docker compose -f docker-compose.prod.yml up -d

            echo "==> Forçando recriação do frontend"
            docker compose -f docker-compose.prod.yml up -d --force-recreate frontend

            echo "==> Status dos containers"
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Validar HTML servido pelo frontend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /var/www/alca-financas

            echo "==> index.html servido pelo nginx"
            docker compose -f docker-compose.prod.yml exec -T frontend sh -lc 'sed -n "1,20p" /usr/share/nginx/html/index.html'
          EOF

name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline - Supabase"]
    types: [completed]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.9'

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: alcahub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build OpenClaw Bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/openclaw_bridge/Dockerfile
          push: false
          load: true
          tags: alcahub-openclaw-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images
        run: docker save alcahub-backend:latest alcahub-openclaw-bridge:latest | gzip > backend-images.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "backend-images.tar.gz"
          target: "/tmp/"

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            gunzip -c /tmp/backend-images.tar.gz | docker load
            rm /tmp/backend-images.tar.gz
            cd /var/www/alca-financas
            docker-compose -f docker-compose.prod.yml up -d openclaw-bridge backend
            docker system prune -f

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build for production
        working-directory: ./frontend
        env:
          VITE_API_URL: https://api.alcahub.com.br
          NODE_ENV: production
        run: npm run build

      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "frontend/dist/*"
          target: "/var/www/alca-financas/frontend"
          strip_components: 2

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            sudo systemctl reload nginx

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: ./frontend
        env:
          TEST_ENV: production
        run: npx playwright test e2e/auth.spec.ts e2e/dashboard.spec.ts

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ Production deployment smoke tests failed!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
