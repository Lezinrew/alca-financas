name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline - Supabase"]
    types: [completed]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.9'

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: alcahub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build OpenClaw Bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/openclaw_bridge/Dockerfile
          push: false
          load: true
          tags: alcahub-openclaw-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images
        run: docker save alcahub-backend:latest alcahub-openclaw-bridge:latest | gzip > backend-images.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "backend-images.tar.gz"
          target: "/tmp/"

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            gunzip -c /tmp/backend-images.tar.gz | docker load
            rm /tmp/backend-images.tar.gz
            cd /var/www/alca-financas
            docker-compose -f docker-compose.prod.yml up -d openclaw-bridge backend
            docker system prune -f

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Build frontend on server into build/frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            set -e
            cd /var/www/alca-financas

            echo "==> Limpando builds antigos"
            rm -rf frontend/dist build/frontend
            mkdir -p build/frontend

            echo "==> Buildando frontend com Node 22 em container"
            docker run --rm \
              -v /var/www/alca-financas/frontend:/app \
              -w /app \
              node:22-alpine \
              sh -lc "npm install && npm run build"

            echo "==> Copiando dist para build/frontend"
            cp -a frontend/dist/. build/frontend/

            echo "==> Forçando recriação do container frontend"
            docker compose -f docker-compose.prod.yml up -d --force-recreate frontend

            echo "==> Validando index.html servido pelo nginx"
            docker compose -f docker-compose.prod.yml exec -T frontend sed -n '1,20p' /usr/share/nginx/html/index.html

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: ./frontend
        env:
          TEST_ENV: production
        run: npx playwright test e2e/auth.spec.ts e2e/dashboard.spec.ts

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ Production deployment smoke tests failed!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
