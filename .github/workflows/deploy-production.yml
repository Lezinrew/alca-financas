name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline - Supabase"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: production
        type: choice
        options:
          - production

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.9"
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: alcahub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build OpenClaw Bridge image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/openclaw_bridge/Dockerfile
          push: false
          load: true
          tags: alcahub-openclaw-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images
        run: docker save alcahub-backend:latest alcahub-openclaw-bridge:latest | gzip > backend-images.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "backend-images.tar.gz"
          target: "/tmp/"

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            set -e
            gunzip -c /tmp/backend-images.tar.gz | docker load
            rm -f /tmp/backend-images.tar.gz
            cd /var/www/alca-financas
            git fetch origin
            git reset --hard ${{ env.DEPLOY_SHA }}
            git clean -fd
            docker compose -f docker-compose.prod.yml up -d openclaw-bridge backend

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-backend]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Build frontend on server into build/frontend
        uses: appleboy/ssh-action@v1.2.0
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY
          script: |
            set -e
            cd /var/www/alca-financas
            git fetch origin
            git reset --hard ${{ env.DEPLOY_SHA }}
            git clean -fd

            echo "==> Limpando builds antigos"
            rm -rf frontend/dist build/frontend
            mkdir -p build/frontend

            echo "==> Buildando frontend (Vite precisa de VITE_SUPABASE_* no build)"
            if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
              echo "ERRO: Defina os secrets VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY no ambiente production do GitHub."
              exit 1
            fi
            docker run --rm \
              -e VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
              -e VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
              -v /var/www/alca-financas/frontend:/app \
              -w /app \
              node:22-alpine \
              sh -lc "npm ci && npm run build"

            echo "==> Copiando dist para build/frontend"
            cp -a frontend/dist/. build/frontend/
            # Nginx no container (user nginx) precisa ler os ficheiros; build como root → 403 sem isto
            chmod -R a+rX build/frontend
            test -f build/frontend/index.html || { echo "ERRO: build/frontend/index.html ausente após o build"; exit 1; }

            echo "==> Recriando container frontend"
            docker compose -f docker-compose.prod.yml up -d --force-recreate frontend

            echo "==> Validando index.html servido pelo nginx"
            docker compose -f docker-compose.prod.yml exec -T frontend sed -n '1,20p' /usr/share/nginx/html/index.html

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: ./frontend
        env:
          TEST_ENV: production
        run: npx playwright test e2e/auth.spec.ts e2e/dashboard.spec.ts --project=chromium

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: frontend/playwright-report/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⚠️ Production deployment smoke tests failed!
            Repository: ${{ github.repository }}
            Commit: ${{ env.DEPLOY_SHA }}
            Author: ${{ github.actor }}
