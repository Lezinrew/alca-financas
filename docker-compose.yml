services:
  # Ambiente de desenvolvimento: backend com auto-reload + Supabase
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Supabase (required)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Backend config
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      HOST: 0.0.0.0
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      # OpenClaw (rede interna; opcional)
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_BRIDGE_URL: http://openclaw-bridge:8089
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    volumes:
      - ./backend:/app
    command: python app.py  # Dev server com hot-reload (Flask debug mode)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ambiente de desenvolvimento: frontend com Vite (npm run dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenClaw - microserviço interno (OPCIONAL para dev local)
  # Para habilitar: docker compose --profile openclaw up -d
  openclaw-gateway:
    build:
      context: services/openclaw
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    container_name: openclaw-gateway
    profiles: ["openclaw"]  # OPCIONAL: só sobe se --profile openclaw
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_MODE: "local"
      OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUS_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    command: ["--bind", "lan", "--port", "18789"]
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    networks:
      - default
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=64M
    user: "1000:1000"
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
      test: [ "CMD-SHELL", "node dist/index.js health --token \"$$OPENCLAW_GATEWAY_TOKEN\" || exit 1" ]

  openclaw-bridge:
    build:
      context: .
      dockerfile: services/openclaw_bridge/Dockerfile
    container_name: openclaw-bridge
    profiles: ["openclaw"]  # OPCIONAL: só sobe se --profile openclaw
    environment:
      OPENCLAW_BIN: openclaw
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_TIMEOUT: "90"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # OpenClaw CLI: onboarding, dashboard, canais, dispositivos (rode sob demanda)
  openclaw-cli:
    image: openclaw-gateway:local
    container_name: openclaw-cli
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    networks:
      - default
    profiles:
      - cli
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    entrypoint: [ "node", "dist/index.js" ]
    command: [ "--help" ]

# Note: Supabase is a managed service, so no database container is needed.
# Configure SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in .env file.
#
# For local Supabase development (optional):
# 1. Install Supabase CLI: npm install -g supabase
# 2. Initialize: supabase init
# 3. Start: supabase start
# 4. This will start a local Supabase instance with PostgreSQL
# 5. Update .env with local Supabase credentials

volumes:
  openclaw_config:
  openclaw_workspace:


networks:
  default:
    name: alca-financas-network
