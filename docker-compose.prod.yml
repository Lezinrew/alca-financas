services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    # Expõe explicitamente as variáveis críticas (interpolação a partir do `.env` na raiz).
    # Sem SUPABASE_JWT_SECRET o Flask rejeita access tokens HS256 do Supabase → 401 em /api/*.
    environment:
      SUPABASE_URL: ${SUPABASE_URL:?set SUPABASE_URL in .env}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY in .env}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?set SUPABASE_JWT_SECRET in .env}
      SUPABASE_JWT_AUD: ${SUPABASE_JWT_AUD:-}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      FLASK_ENV: ${FLASK_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      HOST: ${HOST:-0.0.0.0}
      FRONTEND_URL: ${FRONTEND_URL:-}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_BRIDGE_URL: ${OPENCLAW_BRIDGE_URL:-http://openclaw-bridge:8089}
    ports:
      - "8001:8001"
    restart: always
    command: gunicorn --bind 0.0.0.0:8001 --workers 4 app:app
    depends_on:
      - openclaw-bridge
    networks:
      - alca-network

  frontend:
    image: nginx:alpine
    volumes:
      - ./build/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: always
    networks:
      - alca-network

  # OpenClaw Gateway (microserviço interno)
  openclaw-gateway:
    build:
      context: services/openclaw
      dockerfile: Dockerfile
    image: openclaw-gateway:latest
    container_name: openclaw-gateway-prod
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_BIND: "0.0.0.0"
      OPENCLAW_GATEWAY_PORT: "18789"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    networks:
      - alca-network
    restart: always
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=64M
    user: "1000:1000"
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
      test: [ "CMD-SHELL", "node dist/index.js health --token \"$$OPENCLAW_GATEWAY_TOKEN\" || exit 1" ]

  # OpenClaw Bridge
  openclaw-bridge:
    build:
      context: .
      dockerfile: services/openclaw_bridge/Dockerfile
    container_name: openclaw-bridge-prod
    environment:
      OPENCLAW_BIN: openclaw
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_TIMEOUT: "90"
    depends_on:
      - openclaw-gateway
    networks:
      - alca-network
    restart: always

volumes:
  openclaw_config:
  openclaw_workspace:

networks:
  alca-network:
    driver: bridge
