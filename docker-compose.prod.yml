services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    restart: always
    command: gunicorn --bind 0.0.0.0:8001 --workers 4 app:app

  frontend:
    image: nginx:alpine
    volumes:
      - ./build/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: always
