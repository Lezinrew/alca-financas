
services:
  # Backend Flask em produção (Supabase + Gunicorn)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Backend config
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      HOST: 0.0.0.0
      FLASK_ENV: production
      # Chatbot: bridge URL e timeout (backend usa para /api/chatbot/*)
      OPENCLAW_BRIDGE_URL: http://openclaw-bridge:8089
      OPENCLAW_TIMEOUT: ${OPENCLAW_TIMEOUT:-60}
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    restart: always
    command: gunicorn --bind 0.0.0.0:${BACKEND_PORT:-8001} --workers 4 --timeout 30 app:app

  # Frontend em produção servido por Nginx
  frontend:
    image: nginx:alpine
    volumes:
      - ./build/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  openclaw-gateway:
    build:
      context: services/openclaw
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    container_name: openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_MODE: "local"
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    command: [ "--bind", "lan", "--port", "18789", "--allow-unconfigured" ]
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
      - ./services/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    networks:
      - default
    restart: always
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=64M
    user: "1000:1000"
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
      test: [ "CMD-SHELL", "node dist/index.js health --token \"$$OPENCLAW_GATEWAY_TOKEN\" || exit 1" ]

  openclaw-bridge:
    build:
      context: .
      dockerfile: services/openclaw_bridge/Dockerfile
    container_name: openclaw-bridge
    environment:
      OPENCLAW_BIN: ${OPENCLAW_BIN:-openclaw}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_TIMEOUT: ${OPENCLAW_TIMEOUT:-90}
    depends_on:
      - openclaw-gateway
    networks:
      - default
    restart: always
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8089/health || exit 1"]

  openclaw-cli:
    image: openclaw-gateway:local
    container_name: openclaw-cli
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
      - ./services/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    networks:
      - default
    profiles:
      - cli
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    entrypoint: [ "node", "dist/index.js" ]
    command: [ "--help" ]

volumes:
  openclaw_config:
  openclaw_workspace:


networks:
  default:
    name: alca-financas-prod-network
